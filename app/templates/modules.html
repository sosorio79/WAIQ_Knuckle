{% extends "base.html" %}
{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modules.css') }}">
{% endblock %}
{% block content %}
  <h2>Labs</h2>
  <p>Hands-on exercises and walkthroughs. Pick a lab and exploit the vulnerable app.</p>
  <div class="module-grid">
    {% for m in modules %}
      <a href="{{ url_for('module_detail', slug=m.slug) }}" class="module-card">
        <img src="{{ url_for('static', filename='images/modules/' ~ m.slug ~ '.svg') }}" alt="" class="module-icon">
        <h3>{{ m.title }}</h3>
        <p>{{ m.description }}</p>
        <span class="module-meta">{{ m.type }}</span>
      </a>
    {% endfor %}
  </div>
{% endblock %}
