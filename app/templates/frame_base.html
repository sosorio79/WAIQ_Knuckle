<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ module.title }} – WAIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-cyberpunk.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lab.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/terminal.css') }}">
  <style>
    body { margin: 0; padding: 12px; min-height: 100vh; box-sizing: border-box; overflow-x: hidden; }
    .frame-terminal { width: 100%; height: 100%; min-height: 300px; }
    .frame-terminal .terminal-screen { min-height: 280px; }
    .frame-app-body { font-size: 1.0625rem; line-height: 1.65; }
    .frame-app-body label { display: block; }
    .frame-app-body input[type="text"],
    .frame-app-body input[type="number"],
    .frame-app-body textarea { max-width: 100%; box-sizing: border-box; font-size: 1rem; }
  </style>
</head>
<body>
  {% block frame_content %}{% endblock %}
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
